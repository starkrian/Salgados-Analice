<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Salgados</title>
    <!-- Importando a fonte Poppins do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos Gerais */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #fff5e6; /* Fundo levemente creme/alaranjado */
            color: #333;
            margin: 0;
            padding: 20px; 
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Mantém bonito no PC, mas perfeito para celular */
        }

        h2 {
            text-align: center;
            color: #d35400; /* Laranja escuro elegante */
            margin-bottom: 25px;
        }

        /* Cartões (Cards) */
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); /* Sombra suave */
            margin-bottom: 25px; 
        }

        .card h3 {
            margin-top: 0;
            color: #444;
            font-size: 1.1rem;
            border-bottom: 2px solid #ffeed9;
            padding-bottom: 10px;
        }

        /* Formulários e Botões */
        input { 
            font-family: 'Poppins', sans-serif;
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
            transition: 0.3s;
        }

        input:focus {
            border-color: #e67e22;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(230, 126, 34, 0.3);
        }

        button { 
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            padding: 12px; 
            margin-top: 15px; 
            width: 100%; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            transition: 0.3s;
        }

        .btn-add { 
            background-color: #e67e22; /* Laranja principal */
            color: white; 
            font-size: 1rem;
        }

        .btn-add:hover { 
            background-color: #d35400; 
            transform: translateY(-2px); /* Efeito de pular um pouquinho */
        }

        /* Lista de Clientes */
        .cliente-item { 
            background: #fff; 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #e67e22; /* Detalhe colorido na esquerda */
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .cliente-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .cliente-info { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .cliente-info div {
            line-height: 1.5;
        }

        .cliente-nome {
            font-size: 1.1rem;
            color: #d35400;
        }

        .valor-total {
            color: #27ae60; /* Verde para destacar o dinheiro */
            font-size: 1.05rem;
        }

        .btn-pago { 
            background-color: #2ecc71; 
            color: white; 
            padding: 8px 15px; 
            margin-top: 0;
            width: auto; 
            border-radius: 20px; /* Botão mais redondinho */
            font-size: 0.9rem;
        }

        .btn-pago:hover { 
            background-color: #27ae60; 
            transform: scale(1.05);
        }

        .mensagem-vazia {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🥟 Controle de Salgados</h2>

        <div class="card">
            <h3>Nova Venda</h3>
            <input type="text" id="nomeCliente" placeholder="Nome do Cliente (ex: João)">
            <input type="number" id="qtdSalgados" placeholder="Quantidade (ex: 5)">
            <input type="number" id="valorUnidade" placeholder="Valor da Unidade (ex: 5.50)" step="0.01">
            <button class="btn-add" onclick="adicionarVenda()">Adicionar Venda</button>
        </div>

        <div class="card">
            <h3>Valores a Receber</h3>
            <div id="listaClientes"></div>
        </div>
    </div>

    <script>
        // O JavaScript (a lógica) continua exatamente igual!
        let vendas = JSON.parse(localStorage.getItem('vendasSalgados')) || {};

        function adicionarVenda() {
            let nome = document.getElementById('nomeCliente').value.trim();
            let qtd = parseInt(document.getElementById('qtdSalgados').value);
            let valor = parseFloat(document.getElementById('valorUnidade').value);

            if (!nome || isNaN(qtd) || isNaN(valor)) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            if (vendas[nome]) {
                vendas[nome].quantidade += qtd;
                vendas[nome].valorTotal += (qtd * valor);
            } else {
                vendas[nome] = { quantidade: qtd, valorTotal: (qtd * valor) };
            }

            localStorage.setItem('vendasSalgados', JSON.stringify(vendas));
            atualizarTela();
            
            document.getElementById('nomeCliente').value = '';
            document.getElementById('qtdSalgados').value = '';
        }

        function quitarDivida(nomeDoCliente) {
            if (confirm(`Tem certeza que deseja dar baixa no pagamento de ${nomeDoCliente}?`)) {
                delete vendas[nomeDoCliente];
                localStorage.setItem('vendasSalgados', JSON.stringify(vendas));
                atualizarTela();
            }
        }

        function atualizarTela() {
            let lista = document.getElementById('listaClientes');
            lista.innerHTML = ''; 

            if (Object.keys(vendas).length === 0) {
                lista.innerHTML = '<p class="mensagem-vazia">Nenhuma dívida pendente. Que venham mais vendas! 🚀</p>';
                return;
            }

            for (let cliente in vendas) {
                let dados = vendas[cliente];
                
                lista.innerHTML += `
                    <div class="cliente-item">
                        <div class="cliente-info">
                            <div>
                                <strong class="cliente-nome">${cliente}</strong> <br>
                                Salgados: ${dados.quantidade} un. <br>
                                <strong class="valor-total">Total: R$ ${dados.valorTotal.toFixed(2)}</strong>
                            </div>
                            <button class="btn-pago" onclick="quitarDivida('${cliente}')">✅ Recebido</button>
                        </div>
                    </div>
                `;
            }
        }

        atualizarTela();
    </script>

</body>
</html>
